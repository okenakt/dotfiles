# --- Core ---
unbind C-b
set -g prefix `
bind ` send-prefix

bind r source-file ~/.tmux.conf \; display-message "Reloaded tmux.conf"

set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc'
set -g base-index 1
setw -g pane-base-index 1
setw -g xterm-keys on

# Forward modern extended-key encodings (CSI-u / kitty protocol) through tmux
# so Shift+Enter etc. reach the app (e.g. Claude Code multiline input).
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# --- Mouse ---
set -g mouse on

# --- App Context Navigation (no prefix) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n C-M-Left split-window -h -b -c "#{pane_current_path}"
bind -n C-M-Right split-window -h -c "#{pane_current_path}"
bind -n C-M-Up split-window -v -b -c "#{pane_current_path}"
bind -n C-M-Down split-window -v -c "#{pane_current_path}"
bind -n M-PageUp previous-window
bind -n M-PageDown next-window
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-= resize-pane -R 5 # grow horizontally
bind -n M-+ resize-pane -D 5 # grow vertically
bind -n M-- resize-pane -L 5 # shrink horizontally
bind -n M-_ resize-pane -U 5 # shrink vertically

# --- Session And Destructive Management (prefix required) ---
bind d detach-client
bind q kill-pane
bind e choose-tree -Zw
bind n new-session
unbind z
bind f resize-pane -Z # toggle pane fullscreen
unbind '"' # unbind default vertical split
unbind % # unbind default horizontal split

# --- GUI Appearance ---
set -g pane-border-style "fg=#2A2A36,bg=default"
set -g pane-active-border-style "fg=#4DA6FF,bg=default"

# --- Status Bar ---
set -g status on
set -g status-interval 1
set -g status-justify centre
set -g status-style "bg=#1A1A24,fg=#D7D7DF"
set -g message-style "bg=#1A1A24,fg=#FFD27A"
set -g message-command-style "bg=#1A1A24,fg=#FFD27A"
set -g display-time 1500
set -g display-panes-active-colour "#4DA6FF"
set -g display-panes-colour "#2A2A36"

# --- Status Left (session | cwd short) ---
set -g status-left-length 60
# Powerline glyphs:    
set -g status-left "#[bg=#4DA6FF,fg=#000000,bold] #S #[bg=#1A1A24,fg=#4DA6FF]#[fg=#FFD27A,bg=#1A1A24]   #{b:pane_current_path}"

# --- Status Right (date | time) ---
set -g status-right-length 60
set -g status-right "#[fg=#1A1A24,bg=#2A2A36]#[fg=#D7D7DF,bg=#2A2A36] %Y/%m/%d %a #[fg=#2A2A36,bg=#1A1A24]#[fg=#D7D7DF,bg=#1A1A24] %H:%M:%S "

# --- Window list (inactive / current) ---
setw -g window-status-format " #[fg=#C6C6C6,bg=#1A1A24] #I:#W "
setw -g window-status-current-format "#[fg=#1A1A24,bg=#4DA6FF,bold] #I:#W #[fg=#4DA6FF,bg=#1A1A24]"

# --- Copy-mode (vim-like) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
