#################################
#  Picom Config
#################################

backend = "xrender";          # no GPU needed
vsync = false;                # disable to avoid remote lag
detect-client-opacity = false;

##########################
#  Opacity
##########################
inactive-opacity = 0.9;
active-opacity   = 0.95;
frame-opacity    = 0.8;
inactive-dim = 0.0;
opacity-rule = [
  "100:name *= 'Google Chrome'",
  "100:class_g = 'Google-chrome'",
  "100:class_g = 'google-chrome'"
];

##########################
#  Shadow
##########################
shadow = false;
shadow-radius = 10;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-opacity = 0.20;
shadow-color = "#000000";
shadow-exclude = [
  "name *= 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'Rofi'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

##########################
#  Corner rounding
##########################
corner-radius = 0;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

##########################
#  Blur (disabled)
##########################
blur-method = "none";
blur-background = false;

##########################
#  Fading
##########################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 10;

##########################
#  Window types
##########################
wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 1.0; focus = true; };
  dock    = { shadow = false; };
  dnd     = { shadow = false; };
  popup_menu = { opacity = 1.0; };
  dropdown_menu = { opacity = 1.0; };
};
